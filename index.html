<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Du pain sur la planche</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Du pain sur la planche</div>
        <ul>
            <li>VISION</li>
            <li>MENU</li>
            <li>AVIS</li>
            <li>BOUTIQUES</li>
            <li>CONTACT</li>
        </ul>
        <button class="btn-boutique">TROUVER UNE BOUTIQUE</button>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <div class="cards-grid">
                <div class="card">🌾 Tradition</div>
                <div class="card">✨ Qualité artisanale</div>
                <div class="card">🥖 Produits frais</div>
                <div class="card">🇫🇷 Savoir-faire français</div>
            </div>
            <div class="hero-image">
                <img src="1772713528417.jpg" alt="Pain">
                <div class="quote">
                    "Le pain est le roi de la table..."
                </div>
            </div>
        </div>
    </header>

    <section class="la-carte">
        <span>NOS DÉLICES</span>
        <h2>La Carte</h2>
        <p>Formules fraîches et boissons gourmandes, préparées avec soin chaque matin.</p>
        <div class="menu-tabs">
            <button class="active">Petit Déjeuner</button>
            <button>Formule Déjeuner</button>
            <button>Boissons Chaudes</button>
        </div>
    </section>
</body>
</html>
